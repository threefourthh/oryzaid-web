<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- This blank base64 favicon actively overwrites the old cached logo in the tab -->
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  
  <title>OryzAID | Mission Planning</title>
  <meta name="description"
    content="OryzAID mission planning dashboard for drawing areas and generating flight paths." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
  <link rel="stylesheet" href="css/drawmap.css" />

  <style>
    /* "FOLLOW THE PURPLE" UI FLOW */
    .mission-input {
      border: 1px solid rgba(156, 0, 150, 0.3) !important;
    }
    .mission-input:hover, .mission-input:focus-within {
      border-color: #9c0096 !important;
      box-shadow: 0 4px 12px rgba(156, 0, 150, 0.08) !important;
    }
    .mission.action.btn-purple[disabled] {
      background: #e5e7eb !important;
      color: #9ca3af !important;
      box-shadow: none !important;
    }

    /* =========================================
       TOPBAR SEARCH BAR & PIN
    ========================================= */
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 8px 16px;
      width: 100%;
      max-width: 440px;
      margin: 0 20px;
      transition: all 0.2s ease;
    }
    .topbar-search:focus-within {
      border-color: #9c0096;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(156, 0, 150, 0.1);
    }
    .topbar-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      color: #111827;
      font-weight: 500;
      width: 100%;
      padding-left: 8px;
    }
    .topbar-search input::placeholder {
      color: #9ca3af;
      font-weight: 400;
    }
    .topbar-search button.search-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0 8px;
      transition: transform 0.2s;
    }
    .topbar-search button.search-btn:hover {
      transform: scale(1.15);
    }
    
    .search-divider {
      width: 1px;
      height: 24px;
      background: #d1d5db;
      margin: 0 8px;
    }
    
    .topbar-search button.pin-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #9c0096;
      font-weight: 700;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      white-space: nowrap;
      border-radius: 999px;
      transition: all 0.2s ease;
    }
    .topbar-search button.pin-btn:hover {
      background: rgba(156, 0, 150, 0.1);
    }
    
    @media (max-width: 900px) {
      .topbar-search {
        order: 3;
        max-width: 100%;
        margin: 10px 0 0 0;
      }
    }
  </style>
</head>

<body>
  <div id="centerNotif" class="center-notif">
    <div class="center-notif-box">
      <span id="centerNotifText">Message here</span>
      <button id="centerNotifOk">OK</button>
    </div>
  </div>

  <header class="me-topbar">
    <!-- LEFT: Logo -->
    <a href="index.html" class="me-brand" aria-label="Go to home">
      <span class="logo-text">Oryz<span class="aid-gradient">AID</span></span>
    </a>

    <!-- CENTER: The Search Bar & Pin Button -->
    <div class="topbar-search">
      <input type="text" id="mapSearchInput" placeholder="Search for field (e.g. Tuguegarao)..." />
      <button id="mapSearchBtn" class="search-btn" title="Search">🔍</button>
      <div class="search-divider"></div>
      <button id="dropPinBtn" class="pin-btn" title="Drop Takeoff Pin Here">📍 Set Pin</button>
    </div>

    <!-- RIGHT: Actions -->
    <div class="me-actions">
      <div class="mission-display">
        <span class="tag">PLAN</span>
        <span id="planLabel">Creating plan...</span>
      </div>
      <button id="backBtn" class="me-btn me-btn-ghost" type="button">Back</button>
    </div>
  </header>

  <main>
    <div class="map-shell">
      <div id="map" role="application" aria-label="OryzAID map"></div>
      <div id="areaDisplay" aria-live="polite">Area: 0 ha</div>
      <div id="hintDisplay" class="hint-display" aria-live="polite">
        Draw the field boundary using the map tools.
      </div>
    </div>
  </main>

  <div class="missionbar" aria-label="Mission planning actions">
    <div class="mission status" id="plannerStatus" aria-live="polite">
      <span class="label">STATUS</span>
      <span class="value" data-state="planning">PLANNING</span>
    </div>

    <!-- Flight Altitude -->
    <div class="mission mission-input">
      <label for="altitudeInput" class="mission-input-label">FLIGHT ALT (M)</label>
      <select id="altitudeInput" class="me-alt-select">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12" selected>12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
      </select>
    </div>

    <!-- Takeoff Altitude -->
    <div class="mission mission-input">
      <label for="takeoffInput" class="mission-input-label">TAKEOFF ALT (M)</label>
      <select id="takeoffInput" class="me-alt-select">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15" selected>15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
      </select>
    </div>

    <!-- Generate Path -->
    <button type="button" class="mission action btn-purple" id="generatePathBtn" disabled>
      <span>GENERATE PATH</span>
    </button>

    <!-- Export -->
    <button type="button" class="mission action btn-purple" id="exportBtn" disabled>
      <span>EXPORT .WAYPOINTS</span>
    </button>

    <!-- Monitor -->
    <button type="button" class="mission action btn-purple" id="monitorBtn" disabled>
      <span>GO TO MONITOR</span>
    </button>

    <!-- Flight Stats -->
    <div class="mission-stats">
      <div class="stat-row">
        <span class="stat-label">Distance:</span>
        <span class="stat-value" id="statDistance">0 m</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Time:</span>
        <span class="stat-value" id="statTime">0.0 min</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Battery:</span>
        <span class="stat-value" id="statBattery">0 mAh</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://unpkg.com/proj4@2.9.2/dist/proj4.js"></script>

  <script type="module" src="js/drawmap/app.js"></script>

  <!-- =========================================
       DYNAMIC REVERSE GEOCODING & INTERCEPTOR
       Forces the correct location name to save!
  ========================================= -->
  <script>
    // --- THE MASTER FIX: Intercept Data Saves ---
    window.currentPlaceName = "";
    window.currentPlanId = "";

    // Intercept Database API Uploads
    const originalFetch = window.fetch;
    window.fetch = async function(...args) {
      const [resource, config] = args;
      if (config && config.method === 'POST' && typeof config.body === 'string' && window.currentPlaceName) {
        try {
          const bodyObj = JSON.parse(config.body);
          let modified = false;
          
          if (bodyObj.mission) {
            bodyObj.mission.place = window.currentPlaceName;
            bodyObj.mission.field_location = window.currentPlaceName;
            bodyObj.mission.mission_name = window.currentPlaceName;
            modified = true;
          } else if (bodyObj.place !== undefined || bodyObj.field_location !== undefined || bodyObj.mission_name !== undefined) {
            if (bodyObj.place !== undefined) bodyObj.place = window.currentPlaceName;
            if (bodyObj.field_location !== undefined) bodyObj.field_location = window.currentPlaceName;
            if (bodyObj.mission_name !== undefined) bodyObj.mission_name = window.currentPlaceName;
            modified = true;
          }
          
          if (modified) {
            config.body = JSON.stringify(bodyObj);
            args[1] = config;
          }
        } catch (e) {}
      }
      return originalFetch.apply(this, args);
    };

    // Intercept LocalStorage Saves
    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
      const missionKeys = ['maizeeye_plans', 'oryzaid_plans', 'local_plans', 'missions'];
      if (missionKeys.includes(key) && window.currentPlaceName) {
        try {
          let plans = JSON.parse(value);
          if (Array.isArray(plans)) {
            plans = plans.map(p => {
              if (!window.currentPlanId || p.id === window.currentPlanId || p.mission_id === window.currentPlanId) {
                p.place = window.currentPlaceName;
                p.field_location = window.currentPlaceName;
                p.mission_name = window.currentPlaceName;
              }
              return p;
            });
            value = JSON.stringify(plans);
          }
        } catch(e) {}
      }
      originalSetItem.apply(this, arguments);
    };
    // --- END INTERCEPT FIX ---


    window.addEventListener("load", () => {
      const searchInput = document.getElementById('mapSearchInput');
      const searchBtn = document.getElementById('mapSearchBtn');
      const dropPinBtn = document.getElementById('dropPinBtn');
      
      let homeMarker = null;

      function getRealMap() {
        if (window.map && typeof window.map.flyTo === 'function') return window.map;
        if (window.L && window.L._maps) {
          const keys = Object.keys(window.L._maps);
          if (keys.length > 0) return window.L._maps[keys[0]];
        }
        return null;
      }

      // Translates the newly dragged pin coordinates into a real readable city/address name
      async function updateLocationString(lat, lon) {
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
          const data = await res.json();
          
          if (data && data.address) {
            const addr = data.address;
            const local = addr.village || addr.suburb || addr.neighbourhood || addr.hamlet || "";
            const city = addr.town || addr.city || addr.municipality || addr.county || "";
            
            let placeName = [local, city].filter(Boolean).join(", ");
            if (!placeName && data.display_name) {
                placeName = data.display_name.split(",").slice(0, 2).join(", ");
            }
            if (!placeName) placeName = "Unknown Location";
            
            // Save globally for the master interceptor!
            window.currentPlaceName = placeName;
            localStorage.setItem('mission_place_name', placeName);
            
            // ===============================================================
            // THE FIX: FORCE AN IMMEDIATE BACKGROUND SAVE TO DATABASE
            // ===============================================================
            const missionKeys = ['maizeeye_plans', 'oryzaid_plans', 'local_plans', 'missions'];
            missionKeys.forEach(key => {
              try {
                let plansStr = localStorage.getItem(key);
                if (plansStr) {
                  let plans = JSON.parse(plansStr);
                  if (Array.isArray(plans)) {
                    let updated = false;
                    plans = plans.map(p => {
                      if (!window.currentPlanId || p.id === window.currentPlanId || p.mission_id === window.currentPlanId) {
                        p.place = placeName;
                        p.field_location = placeName;
                        p.mission_name = placeName;
                        updated = true;
                      }
                      return p;
                    });
                    if (updated) {
                      originalSetItem.call(localStorage, key, JSON.stringify(plans));
                    }
                  }
                }
              } catch(e) {}
            });
            // ===============================================================
            
            // Visually Update the Topbar
            const planLabel = document.getElementById('planLabel');
            if (planLabel) {
                const text = planLabel.innerText;
                const idMatch = text.match(/(plan_\d+_\d+)/);
                const areaMatch = text.match(/(\(\d+\.\d+\s*ha\))/);
                
                if (idMatch) window.currentPlanId = idMatch[1];
                const planId = window.currentPlanId || 'Mission';
                const areaText = areaMatch ? ` ${areaMatch[1]}` : '';
                
                // Replace the old text with the dynamically fetched location
                planLabel.innerText = `${planId} • ${placeName}${areaText}`;
            }
          }
        } catch (err) {
          console.warn("Reverse geocode failed:", err);
        }
      }

      function placeOrMovePin(lat, lon, mapObj) {
        if (!homeMarker) {
          // Custom SVG Pin Design
          const pinIcon = L.divIcon({
            className: 'home-pin-icon',
            html: `
              <div style="position: absolute; transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center;">
                <div style="background: #111827; color: #fff; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 999px; margin-bottom: -8px; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.2); letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.1);">
                  TAKEOFF
                </div>
                <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 6px 12px rgba(156,0,150,0.4)); z-index: 1;">
                  <path d="M12 22C12 22 20 14.5 20 9C20 4.58172 16.4183 1 12 1C7.58172 1 4 4.58172 4 9C4 14.5 12 22 12 22Z" fill="#9c0096" stroke="#ffffff" stroke-width="1.5"/>
                  <circle cx="12" cy="9" r="3.5" fill="#ffffff"/>
                </svg>
              </div>
            `,
            iconSize: [0, 0] 
          });
          
          homeMarker = L.marker([lat, lon], { 
            draggable: true,
            icon: pinIcon
          }).addTo(mapObj);
          
          homeMarker.bindPopup("<b>Takeoff Point</b><br>Drag this pin to adjust your exact launch spot.").openPopup();
          
          // TRIGGERS REVERSE GEOCODE EVERY TIME YOU DRAG THE PIN
          homeMarker.on('dragend', function(e) {
             const pos = e.target.getLatLng();
             window.takeoffLocation = pos;
             updateLocationString(pos.lat, pos.lng); // Translates new location
          });
        } else {
          homeMarker.setLatLng([lat, lon]);
          homeMarker.openPopup();
        }
        
        window.takeoffLocation = { lat, lng: lon };
        updateLocationString(lat, lon); // Translates initial drop
      }

      dropPinBtn.addEventListener('click', () => {
        const realMap = getRealMap();
        if (realMap) {
          const center = realMap.getCenter();
          placeOrMovePin(center.lat, center.lng, realMap);
        } else {
          alert("Map is not ready yet. Please wait a second.");
        }
      });

      const performSearch = async () => {
        const query = searchInput.value.trim();
        if (!query) return;

        searchBtn.innerHTML = '⏳';
        searchBtn.disabled = true;

        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
          const data = await res.json();

          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);
            const realMap = getRealMap();

            if (realMap) {
              realMap.flyTo([lat, lon], 16, { animate: true, duration: 1.5 });
              setTimeout(() => { placeOrMovePin(lat, lon, realMap); }, 1600);
            } else {
              alert("⚠️ Map connection blocked!\nPlease open 'js/drawmap/app.js' and add 'window.map = map;'");
            }
          } else {
            alert("Location not found. Try adding a city name (e.g. 'Annafunan, Tuguegarao').");
          }
        } catch (err) {
          console.error("Geocoding error:", err);
          alert("Search failed. Check your internet connection.");
        } finally {
          searchBtn.innerHTML = '🔍';
          searchBtn.disabled = false;
        }
      };

      searchBtn.addEventListener('click', performSearch);
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
      });
    });
  </script>

</body>

</html>
