<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/logo/OryzAID_logo.png">
  <title>OryzAID | Missions</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="css/base.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Page CSS -->
  <link rel="stylesheet" href="css/missions.css" />
</head>

<body>

  <!-- TOP HEADER -->
  <header class="hub-top">
    <a class="brand" href="index.html" style="text-decoration: none;">
      <span class="logo-text" style="font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 900; color: #111827;">Oryz<span class="aid-gradient">AID</span></span>
    </a>

    <div class="actions">
      <button id="newPlanBtn" type="button">+ New Mission</button>
      <a class="back" href="index.html">Back</a>
    </div>
  </header>

  <!-- GRID CONTENT -->
  <main class="hub" role="main">

    <!-- LOCAL PLANS -->
    <section class="card" aria-labelledby="localTitle">
      <div class="card-head">
        <h2 id="localTitle">📝 Mission Plans (Local)</h2>
        <small class="hint">Draft plans saved in this browser</small>
      </div>

      <!-- JS will render cards/items here -->
      <div id="localList" class="list" aria-live="polite">Loading…</div>
    </section>

    <!-- CLOUD MISSIONS -->
    <section class="card" aria-labelledby="cloudTitle">
      <div class="card-head">
        <h2 id="cloudTitle">☁️ Past Missions (Cloud Results)</h2>
        <small class="hint">Uploaded missions available on the server</small>
      </div>

      <!-- JS will render cards/items here -->
      <div id="cloudList" class="list" aria-live="polite">Loading…</div>
    </section>

  </main>
  
  <script type="module" src="js/missions/missions.js"></script>
</body>

</html>
